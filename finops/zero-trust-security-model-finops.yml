specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Zero-Trust Security Model
providerId: zero-trust-security-model
publisherName: Zero-Trust Security Model
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Access Control
  - Cybersecurity
  - Federal
  - Identity Management
  - Network Security
  - NIST
  - Security
  - Security Framework
  - Zero Trust
